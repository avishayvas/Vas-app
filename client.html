<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1B1F2A">
<title>VAS Security · פתיחת קריאת שירות</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B1F2A'/><text x='50' y='68' font-size='48' font-weight='900' text-anchor='middle' fill='%23C9962E' font-family='Arial'>V</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', sans-serif; background: #1B1F2A; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 18px; }
.box { background: #F5F3ED; border-radius: 18px; padding: 26px 22px; width: 100%; max-width: 440px; }
.brand { font-weight: 900; font-size: 26px; letter-spacing: 1px; color: #C9962E; text-align: center; }
.brand span { color: #1B1F2A; font-weight: 300; font-size: 17px; letter-spacing: 3px; }
.sub { text-align: center; color: #6B7080; font-size: 14px; margin: 4px 0 18px; }
label { display: block; font-size: 12.5px; font-weight: 700; color: #555B69; margin: 13px 0 4px; }
input, select, textarea { width: 100%; padding: 11px 12px; border: 1.5px solid #E2DFD5; border-radius: 10px; font-family: inherit; font-size: 15px; background: #fff; }
input:focus, select:focus, textarea:focus { outline: 2px solid #C9962E; border-color: #C9962E; }
.btn { width: 100%; background: #1B1F2A; color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: inherit; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 20px; }
.btn:disabled { opacity: .5; }
.err { color: #D64545; font-size: 13.5px; font-weight: 600; margin-top: 10px; min-height: 18px; text-align: center; }
.success { text-align: center; padding: 30px 10px; display: none; }
.success .big { font-size: 52px; }
.success h2 { margin: 12px 0 8px; color: #1B1F2A; }
.success p { color: #555B69; font-size: 15px; line-height: 1.6; }
.urgent-note { font-size: 12px; color: #8A8F9C; margin-top: 4px; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="box">
  <div id="formView">
    <div class="brand">VAS <span>SECURITY</span></div>
    <div class="sub">פתיחת קריאת שירות · ש.ו טכנולוגיות ביטחון</div>

    <label>שם מלא *</label>
    <input id="f_name" placeholder="ישראל ישראלי">

    <label>חברה / אתר *</label>
    <input id="f_site" placeholder="לדוגמה: מקס סטוק חולון">

    <label>טלפון לחזרה *</label>
    <input id="f_phone" inputmode="tel" placeholder="050-0000000" dir="ltr" style="text-align:right">

    <label>נושא התקלה *</label>
    <select id="f_topic">
      <option value="">— בחרו נושא —</option>
      <option>מצלמות אבטחה</option>
      <option>אזעקה / פריצה</option>
      <option>בקרת כניסה / דלתות</option>
      <option>אינטרקום</option>
      <option>גילוי אש</option>
      <option>תקשורת / רשת</option>
      <option>כריזה</option>
      <option>אחר</option>
    </select>

    <label>רמת דחיפות *</label>
    <select id="f_urgency">
      <option>רגיל</option>
      <option>בינוני</option>
      <option>גבוה</option>
      <option>דחוף</option>
    </select>
    <div class="urgent-note">דחוף = מערכת מושבתת לחלוטין / אירוע ביטחוני</div>

    <label>תיאור התקלה</label>
    <textarea id="f_desc" rows="3" placeholder="תארו בקצרה מה קורה — איפה, מה לא עובד, ממתי"></textarea>

    <div class="err" id="f_err"></div>
    <button class="btn" id="f_send" onclick="send()">📨 שליחת הקריאה</button>
  </div>

  <div class="success" id="successView">
    <div class="big">✅</div>
    <h2>הקריאה התקבלה!</h2>
    <p>הפנייה הועברה לצוות VAS Security.<br>ניצור קשר בהקדם לתיאום טיפול.<br><br><b>VAS Security · ש.ו טכנולוגיות ביטחון</b></p>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyD0_Ji35W2rlaqYjYRqAU-sTksZm0CRDaY",
  authDomain: "vas-schedule.firebaseapp.com",
  projectId: "vas-schedule",
  storageBucket: "vas-schedule.firebasestorage.app",
  messagingSenderId: "763095300879",
  appId: "1:763095300879:web:7d42c00f856ba8fd365c7a"
});
const db = firebase.firestore();
async function send(){
  const name = document.getElementById('f_name').value.trim();
  const site = document.getElementById('f_site').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  const topic = document.getElementById('f_topic').value;
  const urgency = document.getElementById('f_urgency').value;
  const desc = document.getElementById('f_desc').value.trim();
  const err = document.getElementById('f_err');
  err.textContent = '';
  if (!name || !site || !phone || !topic){ err.textContent = 'נא למלא את כל שדות החובה (*)'; return; }
  const btn = document.getElementById('f_send');
  btn.disabled = true; btn.textContent = 'שולח…';
  try {
    await db.collection('leads').add({ name, site, phone, topic, urgency, desc, at: new Date().toISOString() });
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  } catch(e){
    console.error(e);
    err.textContent = 'שגיאה בשליחה — נסו שוב או התקשרו אלינו';
    btn.disabled = false; btn.textContent = '📨 שליחת הקריאה';
  }
}
</script>
</body>
</html>
