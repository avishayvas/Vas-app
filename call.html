<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1B1F2A">
<title>VAS Security · פתיחת קריאת שירות</title>
<meta property="og:title" content="VAS Security · פתיחת קריאת שירות">
<meta property="og:description" content="VAS Security Technology LTD — מצלמות, גילוי אש, בקרת כניסה ותקשורת. פתיחת קריאת שירות מהירה.">
<meta property="og:image" content="https://avishayvas.github.io/Vas-app/icon-512.png">
<meta property="og:url" content="https://avishayvas.github.io/Vas-app/call.html">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B1F2A'/><text x='50' y='68' font-size='48' font-weight='900' text-anchor='middle' fill='%23C9962E' font-family='Arial'>V</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { max-width: 100%; overflow-x: hidden; }
body { font-family: 'Heebo', sans-serif; background: #1B1F2A; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
.box { background: #F5F3ED; border-radius: 18px; padding: 26px 22px; width: 100%; max-width: 460px; }
.brand { font-weight: 900; font-size: 26px; letter-spacing: 1px; color: #C9962E; text-align: center; }
.brand span { color: #1B1F2A; font-weight: 300; font-size: 17px; letter-spacing: 3px; }
.sub { text-align: center; font-size: 14px; color: #555B69; margin: 4px 0 20px; font-weight: 500; }
label { display: block; font-size: 13px; font-weight: 700; color: #555B69; margin: 14px 0 5px; }
input, select, textarea { width: 100%; padding: 13px; border: 1.5px solid #DDD9CC; border-radius: 10px; font-family: inherit; font-size: 16px; background: #fff; }
input:focus, select:focus, textarea:focus { outline: 2px solid #C9962E; border-color: #C9962E; }
.urg-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.urg-btn { padding: 11px 4px; border-radius: 10px; border: 1.5px solid #DDD9CC; background: #fff; font-family: inherit; font-weight: 700; font-size: 13.5px; cursor: pointer; }
.urg-btn.sel { border-color: #1B1F2A; background: #1B1F2A; color: #fff; }
.urg-btn.sel.hot { background: #D64545; border-color: #D64545; }
.submit { width: 100%; margin-top: 22px; background: #C9962E; color: #fff; border: none; border-radius: 12px; padding: 15px; font-family: inherit; font-weight: 800; font-size: 17px; cursor: pointer; }
.submit:disabled { opacity: .5; }
.err { color: #D64545; font-size: 13.5px; font-weight: 600; margin-top: 10px; min-height: 18px; text-align: center; }
.done { text-align: center; padding: 30px 10px; display: none; }
.done .big { font-size: 52px; }
.done h2 { margin: 12px 0 8px; color: #1B1F2A; }
.done p { color: #555B69; font-size: 15px; line-height: 1.6; }
.hp { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="box">
  <div class="brand">VAS <span>SECURITY</span></div>
  <div class="sub">פתיחת קריאת שירות · VAS Security Technology LTD</div>
  <div style="background:#FBF7EE;border:1px dashed #C9962E;border-radius:10px;padding:10px 12px;font-size:13.5px;color:#7A5E1E;font-weight:600;text-align:center;margin-bottom:4px">💡 ככל שתפרטו יותר — נגיע מוכנים עם הציוד המתאים ונטפל מהר יותר</div>

  <div id="form">
    <label>שם מלא *</label>
    <input id="f_name" placeholder="ישראל ישראלי">

    <label>טלפון *</label>
    <input id="f_phone" inputmode="tel" placeholder="050-0000000">

    <label>אתר / סניף / כתובת *</label>
    <input id="f_site" placeholder="מקס סטוק חולון / שם האתר">

    <label>נושא התקלה *</label>
    <select id="f_topic">
      <option value="">— בחרו נושא —</option>
      <option>מצלמות אבטחה</option>
      <option>אזעקה / פריצה</option>
      <option>בקרת כניסה / דלתות</option>
      <option>אינטרקום</option>
      <option>גילוי אש</option>
      <option>תקשורת / אינטרנט</option>
      <option>כריזה</option>
      <option>אחר</option>
    </select>

    <label>סוג הטיפול הנדרש *</label>
    <select id="f_action">
      <option value="">— בחרו —</option>
      <option>תיקון תקלה</option>
      <option>החלפת רכיב</option>
      <option>בדיקה / כיול</option>
      <option>התקנה חדשה / הרחבה</option>
      <option>פריסת קווים / תשתית</option>
      <option>העתקת רכיב למיקום אחר</option>
      <option>אחר</option>
    </select>

    <label>כמות רכיבים (אם רלוונטי)</label>
    <input id="f_qty" placeholder="לדוגמה: 3 מצלמות / 2 גלאים / קו אחד">

    <label>רמת דחיפות *</label>
    <div class="urg-row" id="urgRow">
      <button type="button" class="urg-btn hot" data-v="דחוף">🔴 דחוף</button>
      <button type="button" class="urg-btn" data-v="גבוה">גבוה</button>
      <button type="button" class="urg-btn" data-v="בינוני">בינוני</button>
      <button type="button" class="urg-btn sel" data-v="רגיל">רגיל</button>
    </div>

    <label>📷 תמונות מהאתר (עד 3, לא חובה)</label>
    <input type="file" id="f_photos" accept="image/*" multiple style="display:none" onchange="addPhotos(this.files)">
    <button type="button" onclick="document.getElementById('f_photos').click()" style="width:100%;padding:12px;border:1.5px dashed #C9962E;border-radius:10px;background:#FBF7EE;color:#7A5E1E;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer">📷 צילום / בחירת תמונות</button>
    <div id="thumbs" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"></div>

    <label>תיאור מפורט *</label>
    <textarea id="f_desc" rows="4" placeholder="מה קרה, איפה בדיוק, ממתי, כמה רכיבים מעורבים"></textarea>

    <input class="hp" id="f_company" tabindex="-1" autocomplete="off">

    <div class="err" id="f_err"></div>
    <button class="submit" id="f_send" onclick="send()">שליחת הקריאה 📤</button>
  </div>

  <div class="done" id="done">
    <div class="big">✅</div>
    <h2>הקריאה נקלטה!</h2>
    <p>הצוות שלנו קיבל את הפנייה<br>וניצור קשר בהקדם לתיאום טיפול.<br><br><b>VAS Security · ש.ו טכנולוגיות ביטחון</b></p>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyD0_Ji35W2rlaqYjYRqAU-sTksZm0CRDaY",
  authDomain: "vas-schedule.firebaseapp.com",
  projectId: "vas-schedule",
  storageBucket: "vas-schedule.firebasestorage.app",
  messagingSenderId: "763095300879",
  appId: "1:763095300879:web:7d42c00f856ba8fd365c7a"
});
const db = firebase.firestore();
let urgency = 'רגיל';
let pendingPhotos = [];
function addPhotos(files){
  const remain = 3 - pendingPhotos.length;
  [...files].slice(0, remain).forEach(f => {
    const r = new FileReader();
    r.onload = () => compressImage(r.result, dataUrl => { pendingPhotos.push(dataUrl); renderThumbs(); });
    r.readAsDataURL(f);
  });
  if (files.length > remain) alert('עד 3 תמונות');
  document.getElementById('f_photos').value = '';
}
function compressImage(src, cb){
  const img = new Image();
  img.onload = () => {
    const max = 1200;
    let w = img.width, h = img.height;
    if (w > max || h > max){ const k = max / Math.max(w, h); w = Math.round(w*k); h = Math.round(h*k); }
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(cv.toDataURL('image/jpeg', 0.72));
  };
  img.src = src;
}
function renderThumbs(){
  document.getElementById('thumbs').innerHTML = pendingPhotos.map((p,i)=>
    `<div style="position:relative"><img src="${p}" style="width:74px;height:74px;object-fit:cover;border-radius:10px;border:1.5px solid #DDD9CC">
     <button type="button" onclick="pendingPhotos.splice(${i},1);renderThumbs()" style="position:absolute;top:-6px;left:-6px;width:22px;height:22px;border-radius:50%;border:none;background:#D64545;color:#fff;font-weight:800;cursor:pointer;line-height:1">✕</button></div>`).join('');
}
const TOPIC_HINTS = {
  'מצלמות אבטחה': 'כמה מצלמות? איפה הן? מה הבעיה — אין תמונה / מטושטש / לא מקליט? נדרש קו או מצלמה חדשה?',
  'אזעקה / פריצה': 'מה קורה — התראות שווא / אזור לא נדרך / סוללה? איזה אזור? כמה גלאים?',
  'בקרת כניסה / דלתות': 'איזו דלת/שער? הקורא לא קורא / הדלת לא ננעלת / כרטיסים חדשים? כמה עמדות?',
  'אינטרקום': 'איזו עמדה/דירה? אין שמע / אין וידאו / הדלת לא נפתחת? כמה שפופרות?',
  'גילוי אש': 'איזה אזור בלוח? התראת אמת או תקלה? כמה גלאים? יש דרישת מכון תקנים?',
  'תקשורת / אינטרנט': 'איזה ציוד — ראוטר / סוויץ׳ / נקודות? כמה נקודות? נדרשת פריסה חדשה?',
  'כריזה': 'איזה אזור לא נשמע? כמה רמקולים? הבעיה בעוצמה או שאין שמע כלל?',
  'אחר': 'תארו בפירוט: מה, איפה, ממתי, וכמה רכיבים מעורבים'
};
document.getElementById('f_topic').addEventListener('change', function(){
  const h = TOPIC_HINTS[this.value];
  if (h) document.getElementById('f_desc').placeholder = h;
});
document.querySelectorAll('.urg-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.urg-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    urgency = b.dataset.v;
  };
});
async function send(){
  const err = document.getElementById('f_err');
  err.textContent = '';
  const name = document.getElementById('f_name').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  const site = document.getElementById('f_site').value.trim();
  const topic = document.getElementById('f_topic').value;
  const action = document.getElementById('f_action').value;
  const qty = document.getElementById('f_qty').value.trim();
  const desc = document.getElementById('f_desc').value.trim();
  if (document.getElementById('f_company').value) return; /* honeypot */
  if (!name || !phone || !site || !topic || !action || !desc){
    err.textContent = 'נא למלא את כל השדות המסומנים ב-*';
    return;
  }
  if (desc.length < 15){
    err.textContent = 'תיאור קצר מדי — פרטו מה קרה, איפה וכמה רכיבים, כדי שנגיע מוכנים';
    return;
  }
  const btn = document.getElementById('f_send');
  btn.disabled = true; btn.textContent = 'שולח…';
  try {
    const photoIds = [];
    for (const p of pendingPhotos){
      const ref = await db.collection('vas_intake').add({ t: 'ph', data: p });
      photoIds.push(ref.id);
    }
    await db.collection('vas_intake').add({
      name, phone, site, topic, action, qty, desc, urgency, photoIds,
      at: new Date().toISOString()
    });
    document.getElementById('form').style.display = 'none';
    document.getElementById('done').style.display = 'block';
  } catch(e){
    console.error(e);
    err.textContent = e.code === 'permission-denied' ? 'המערכת עדיין לא פתוחה לקבלת קריאות (הרשאות)' : 'שגיאה בשליחה — בדקו חיבור אינטרנט ונסו שוב';
    btn.disabled = false; btn.textContent = 'שליחת הקריאה 📤';
  }
}
</script>
</body>
</html>
