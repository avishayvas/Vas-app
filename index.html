<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B1F2A">

<title>VAS Security · ניהול פרויקטים</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Heebo', sans-serif;
  background: #F5F3ED;
  min-height: 100vh;
  color: #1B1F2A;
  padding-bottom: 84px;
}
.vas-header {
  background: #1B1F2A; color: #fff;
  padding: 14px 18px 12px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 20;
}
.vas-brand { font-weight: 900; font-size: 21px; letter-spacing: 1px; color: #C9962E; }
.vas-brand span { color: #fff; font-weight: 300; font-size: 15px; letter-spacing: 3px; }
.vas-sub { font-size: 12px; color: #9AA0AE; margin-top: 1px; }
.vas-side { text-align: left; }
.vas-date { font-size: 13px; color: #C9962E; font-weight: 600; }
.conn { font-size: 11px; font-weight: 700; }
.conn.on { color: #5CB87A; } .conn.off { color: #D64545; }
main { padding: 14px 14px 20px; max-width: 760px; margin: 0 auto; }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.kpi { background: #fff; border-radius: 12px; padding: 12px 14px; border-inline-start: 5px solid #ccc; box-shadow: 0 1px 3px rgba(27,31,42,.07); }
.kpi-value { font-size: 28px; font-weight: 800; line-height: 1; }
.kpi-label { font-size: 12px; color: #6B7080; margin-top: 4px; font-weight: 500; }

.card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(27,31,42,.07); }
.card-title { font-weight: 700; font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.urgent-title { color: #D64545; }
.empty { color: #8A8F9C; font-size: 14px; padding: 8px 0; text-align: center; }

.proj-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.proj-bar-name { width: 38%; font-size: 13px; font-weight: 600; }
.proj-bar-track { flex: 1; background: #EFEDE6; border-radius: 6px; height: 14px; overflow: hidden; }
.proj-bar-fill { height: 100%; background: #C9962E; border-radius: 6px; transition: width .4s; }
.proj-bar-num { width: 24px; text-align: center; font-weight: 700; font-size: 13px; }

.mini-task { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #F0EEE7; cursor: pointer; }
.mini-task:last-child { border-bottom: none; }
.mini-task .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.mini-task-title { font-size: 14px; font-weight: 600; }
.mini-task-sub { font-size: 12px; color: #6B7080; }

.filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.filter-row select { flex: 1; min-width: 110px; padding: 9px 10px; border-radius: 10px; border: 1.5px solid #E2DFD5; background: #fff; font-family: inherit; font-size: 13px; font-weight: 500; }

.task-card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; border-inline-start: 5px solid #ccc; box-shadow: 0 1px 3px rgba(27,31,42,.07); }
.task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.task-title { font-weight: 700; font-size: 15px; cursor: pointer; flex: 1; }
.status-chip { border: none; color: #fff; font-family: inherit; font-weight: 700; font-size: 12px; padding: 5px 12px; border-radius: 999px; cursor: pointer; flex-shrink: 0; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 7px; font-size: 12.5px; color: #555B69; cursor: pointer; }
.task-meta .overdue { color: #D64545; font-weight: 700; }
.task-meta a { color: #3B6EA5; text-decoration: none; font-weight: 600; }
.task-notes { margin-top: 6px; font-size: 12.5px; color: #6B7080; background: #FAF9F4; border-radius: 8px; padding: 6px 10px; }
.task-photos { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.task-photos img { width: 54px; height: 54px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #E2DFD5; background: #EFEDE6; }

.fab { position: fixed; bottom: 78px; inset-inline-start: 16px; z-index: 25; background: #C9962E; color: #fff; border: none; border-radius: 999px; padding: 13px 20px; font-family: inherit; font-weight: 800; font-size: 15px; box-shadow: 0 4px 14px rgba(201,150,46,.45); cursor: pointer; }

.vas-nav { position: fixed; bottom: 0; inset-inline: 0; z-index: 30; background: #1B1F2A; display: flex; padding: 6px 4px calc(6px + env(safe-area-inset-bottom)); }
.vas-nav-btn { flex: 1; background: none; border: none; color: #8A8F9C; font-family: inherit; font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 0; cursor: pointer; border-radius: 10px; }
.vas-nav-btn .ic { font-size: 19px; }
.vas-nav-btn.active { color: #C9962E; }

.modal-overlay { position: fixed; inset: 0; background: rgba(27,31,42,.55); z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #fff; width: 100%; max-width: 560px; max-height: 92vh; border-radius: 18px 18px 0 0; display: flex; flex-direction: column; animation: slideUp .22s ease; }
@keyframes slideUp { from { transform: translateY(40px); opacity: .5; } to { transform: none; opacity: 1; } }
@media (prefers-reduced-motion: reduce) { .modal { animation: none; } }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #EFEDE6; font-weight: 800; font-size: 16px; }
.modal-header button { background: none; border: none; font-size: 18px; cursor: pointer; color: #6B7080; padding: 4px 8px; }
.modal-body { padding: 14px 16px 24px; overflow-y: auto; }
.modal-body label { display: block; font-size: 12.5px; font-weight: 700; color: #555B69; margin: 12px 0 4px; }
.modal-body label:first-child { margin-top: 0; }
.modal-body input, .modal-body select, .modal-body textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #E2DFD5; border-radius: 10px; font-family: inherit; font-size: 14px; background: #FBFAF7; }
.modal-body input:focus, .modal-body select:focus, .modal-body textarea:focus { outline: 2px solid #C9962E; border-color: #C9962E; }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-primary { flex: 1; background: #1B1F2A; color: #fff; border: none; border-radius: 10px; padding: 12px; font-family: inherit; font-weight: 800; font-size: 15px; cursor: pointer; }
.btn-primary:disabled { opacity: .4; }
.btn-secondary { flex: 1; background: #EFEDE6; color: #1B1F2A; border: none; border-radius: 10px; padding: 12px; font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer; }
.btn-danger { background: #FBEAEA; color: #D64545; border: none; border-radius: 10px; padding: 12px 16px; font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer; }
.btn-mini { background: #C9962E; color: #fff; border: none; border-radius: 8px; padding: 5px 12px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; }

.photo-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.photo-thumb { position: relative; }
.photo-thumb img { width: 64px; height: 64px; object-fit: cover; border-radius: 10px; border: 1px solid #E2DFD5; }
.photo-thumb button { position: absolute; top: -6px; inset-inline-end: -6px; background: #D64545; color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; cursor: pointer; }
.photo-add { width: 64px; height: 64px; border: 2px dashed #C9962E; background: #FBF7EE; border-radius: 10px; font-size: 22px; cursor: pointer; }

.toggle-row { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; margin: 10px 0; cursor: pointer; }
.toggle-row input { width: auto !important; accent-color: #C9962E; transform: scale(1.2); }

.report-preview { background: #F0EEE7; border-radius: 10px; padding: 12px; margin-top: 10px; font-family: inherit; font-size: 13px; white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto; direction: rtl; text-align: right; }

.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #F0EEE7; cursor: pointer; }
.settings-row:last-child { border-bottom: none; }
.settings-row.inactive { opacity: .45; }
.settings-name { font-weight: 700; font-size: 14px; }
.settings-sub { font-size: 12px; color: #6B7080; }
.settings-badge { font-size: 11px; background: #EFEDE6; padding: 3px 10px; border-radius: 999px; font-weight: 700; color: #555B69; }
.team-kind { font-size: 12px; font-weight: 800; color: #C9962E; margin: 10px 0 2px; letter-spacing: .5px; }

.toast { position: fixed; bottom: 140px; inset-inline: 0; margin: 0 auto; width: fit-content; max-width: 90vw; background: #1B1F2A; color: #fff; padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 700; z-index: 60; box-shadow: 0 4px 14px rgba(0,0,0,.3); display: none; }

.photo-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 70; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.photo-overlay img { max-width: 94vw; max-height: 80vh; border-radius: 10px; }
.photo-overlay div { color: #fff; font-weight: 700; cursor: pointer; }

.help-q { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; border:1.5px solid #C9962E; background:#FBF7EE; color:#C9962E; font-weight:800; font-size:12px; cursor:pointer; padding:0; line-height:1; flex-shrink:0; margin-inline-start:6px; vertical-align:middle; }
.login-screen { position: fixed; inset: 0; background: #1B1F2A; z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: #fff; border-radius: 16px; padding: 26px 22px; width: 100%; max-width: 380px; text-align: center; }
.login-box label { display: block; text-align: right; font-size: 12.5px; font-weight: 700; color: #555B69; margin: 12px 0 4px; }
.login-box input { width: 100%; padding: 12px; border: 1.5px solid #E2DFD5; border-radius: 10px; font-family: inherit; font-size: 15px; background: #FBFAF7; }
.login-box input:focus { outline: 2px solid #C9962E; border-color: #C9962E; }
.login-err { color: #D64545; font-size: 13px; font-weight: 600; margin: 10px 0 4px; min-height: 18px; }
.readonly-banner { background: #C9962E; color: #1B1F2A; text-align: center; font-weight: 800; font-size: 13px; padding: 6px; }

.vid-thumb { width: 54px; height: 54px; border-radius: 8px; background: #1B1F2A; color: #C9962E; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 1px solid #E2DFD5; flex-shrink: 0; }
.photo-thumb .vid-thumb { width: 64px; height: 64px; border-radius: 10px; }
.claim-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; background: #FBF7EE; border: 1px solid #F0E6CF; padding: 8px 10px; border-radius: 8px; font-size: 13px; }
@media (max-width: 400px) {
  .kpi-value { font-size: 24px; }
  .proj-bar-name { width: 44%; font-size: 12px; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>

<header class="vas-header">
  <div>
    <div class="vas-brand">VAS <span>SECURITY</span></div>
    <div class="vas-sub">ניהול פרויקטים ופאנץ׳ ליסט</div>
  </div>
  <div class="vas-side">
    <div class="vas-date" id="hdrDate"></div>
    <div class="conn off" id="connStatus">מתחבר…</div>
    <div id="userTag" style="font-size:11px;color:#C9962E;font-weight:700"></div>
  </div>
</header>
<div id="roBanner" class="readonly-banner" style="display:none">👁️ מצב צפייה בלבד</div>

<main id="app"><div class="card empty">טוען נתונים…</div></main>

<nav class="vas-nav" id="nav"></nav>

<div class="toast" id="toast"></div>
<div class="photo-overlay" id="photoOverlay" onclick="if(event.target===this)closeMedia()">
  <img id="photoOverlayImg" alt="">
  <video id="photoOverlayVid" controls playsinline webkit-playsinline style="max-width:94vw;max-height:80vh;border-radius:10px;display:none"></video>
  <div onclick="closeMedia()">✕ סגירה</div>
</div>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="vas-brand" style="font-size:26px">VAS <span>SECURITY</span></div>
    <div class="vas-sub" style="margin:4px 0 16px">כניסה למערכת ניהול הפרויקטים</div>
    <label>אימייל</label>
    <input id="li_email" type="email" inputmode="email" autocomplete="username" dir="ltr">
    <label>סיסמה</label>
    <input id="li_pass" type="password" autocomplete="current-password" dir="ltr" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="li_err"></div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">התחברות</button>
    <div style="margin-top:12px"><a href="#" onclick="forgotPassword();return false" style="font-size:13px;color:#3B6EA5;font-weight:600">שכחתי סיסמה</a></div>
  </div>
</div>
<div id="modalRoot"></div>
<div id="helpRoot"></div>

<script>
/* ==================== Firebase ==================== */
const firebaseConfig = {
  apiKey: "AIzaSyD0_Ji35W2rlaqYjYRqAU-sTksZm0CRDaY",
  authDomain: "vas-schedule.firebaseapp.com",
  projectId: "vas-schedule",
  storageBucket: "vas-schedule.firebasestorage.app",
  messagingSenderId: "763095300879",
  appId: "1:763095300879:web:7d42c00f856ba8fd365c7a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence({ synchronizeTabs: true }).catch(e => console.warn('persistence:', e.code));
const DOC = db.collection('vas').doc('punch');
const PHOTOS = db.collection('vas');

const READONLY = new URLSearchParams(location.search).get('view') === '1';
const ADMINS = ["אבישי","ליאל","הילה"];
const HOURS_ADMINS = ["אבישי","הילה"];
const isHoursAdmin = () => HOURS_ADMINS.includes(USER);
let USER = localStorage.getItem('vas:user') || '';
const isAdmin = () => ADMINS.includes(USER);
function guardEdit(){
  if (READONLY) { toastMsg('מצב צפייה — אין אפשרות לערוך'); return false; }
  if (!USER) { toastMsg('החשבון לא משויך לאיש צוות — מנהל צריך להזין את האימייל שלכם בצוות'); return false; }
  return true;
}
if (READONLY) document.getElementById('roBanner').style.display = 'block';

/* ==================== Constants ==================== */
const STATUSES = ["פתוח","בטיפול","בוצע","אושר"];
const STATUS_COLORS = {"פתוח":"#D64545","בטיפול":"#E08A2E","בוצע":"#3B6EA5","אושר":"#3E8E5A"};
const URGENCIES = ["דחוף","גבוה","רגיל","נמוך"];
const URGENCY_COLORS = {"דחוף":"#D64545","גבוה":"#E08A2E","רגיל":"#3B6EA5","נמוך":"#8A8F9C"};
const DISCIPLINES = ["גילוי אש","תקשורת","מצלמות","בקרת כניסה","אינטרקום","פריצה","כריזה","כללי"];
const CALL_STATUSES = ["חדשה","שובצה","בטיפול","נסגרה"];
const CALL_STATUS_COLORS = {"חדשה":"#D64545","שובצה":"#E08A2E","בטיפול":"#3B6EA5","נסגרה":"#3E8E5A"};

const SEED = {
  projects: [
    { id:"p1", name:"ליליוס ירושלים", client:"ליליוס", type:"אינטרקום ותקשורת", desc:"מגדל מגורים 33 קומות · 219 יח\"ד", active:true },
    { id:"p2", name:"הקפיטל ירושלים", client:"הקפיטל", type:"גילוי אש", desc:"מגדל מעורב · מגורים, משרדים וחניונים", active:true },
    { id:"p3", name:"קמפוס יובלים נס ציונה", client:"קמפוס יובלים", type:"תקשורת ותשתית פסיבית", desc:"חוזה ביצוע · דירות + מערכות ביטחון", active:true },
    { id:"p4", name:"מקס סטוק", client:"מקס סטוק", type:"שירות ואחזקה", desc:"סניפים: אור עקיבא, חולון, נוף הגליל, נתניה, עפולה", active:true },
    { id:"p5", name:"חירייה", client:"חירייה", type:"שירות", desc:"", active:true },
    { id:"p6", name:"קרית המודיעין", client:"קרית המודיעין", type:"שירות", desc:"", active:true }
  ],
  team: [
    { id:"t1", name:"אבישי", role:"מנהל", kind:"עובד" },
    { id:"t2", name:"תרשיש", role:"טכנאי", kind:"עובד" },
    { id:"t3", name:"ליאל", role:"מנהלת פרויקטים", kind:"עובד" },
    { id:"t4", name:"איגור", role:"טכנאי", kind:"עובד" },
    { id:"t5", name:"רפאל", role:"טכנאי", kind:"עובד" },
    { id:"t6", name:"הילה", role:"מנהלת משרד", kind:"עובד" },
    { id:"t7", name:"אנדריי", role:"קבלן משנה", kind:"קבלן" },
    { id:"t8", name:"דביר", role:"קבלן משנה", kind:"קבלן" },
    { id:"t9", name:"דולב", role:"קבלן משנה", kind:"קבלן" },
    { id:"t10", name:"בוריס", role:"קבלן משנה", kind:"קבלן" },
    { id:"t11", name:"עוזי", role:"קבלן משנה", kind:"קבלן" },
    { id:"t12", name:"מתן", role:"קבלן משנה", kind:"קבלן" }
  ],
  tasks: [],
  calls: []
};

/* ==================== State ==================== */
let S = null;
let tab = 'home';
let filters = { proj:'all', status:'open', assignee:'all', special:null };
let callsShowClosed = false;
let reportProj = '', reportPerson = '', reportDate = '';
let billFrom = '', billTo = '';
let presFrom = '', presTo = '', presWho = '';
const photoCache = {};

const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
const today = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtDate = d => { if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
const isOverdue = t => t.due && t.due < today() && t.status!=='בוצע' && t.status!=='אושר';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const projName = id => { const p=(S.projects||[]).find(x=>x.id===id); return p?p.name:'—'; };

document.getElementById('hdrDate').textContent = fmtDate(today());

/* ==================== Firestore sync ==================== */
const connEl = document.getElementById('connStatus');
function setConn(on){ connEl.textContent = on ? '● מסונכרן' : '● לא מחובר'; connEl.className = 'conn ' + (on?'on':'off'); }

const auth = firebase.auth();
let authUser = null;
let unsubData = null;
function doLogin(){
  const em = document.getElementById('li_email').value.trim();
  const pw = document.getElementById('li_pass').value;
  const errEl = document.getElementById('li_err');
  errEl.textContent = '';
  if (!em || !pw){ errEl.textContent = 'נא למלא אימייל וסיסמה'; return; }
  errEl.textContent = 'מתחבר…'; errEl.style.color = '#6B7080';
  auth.signInWithEmailAndPassword(em, pw).catch(e => {
    errEl.style.color = '#D64545';
    errEl.textContent =
      e.code === 'auth/operation-not-allowed' ? 'שיטת Email/Password לא הופעלה עדיין ב-Firebase' :

async function acceptLead(fid){
  if (!isAdmin()){ toastMsg('קליטת קריאות למנהלים בלבד'); return; }

  const mapU = { 'דחוף':'דחוף', 'גבוה':'גבוה', 'בינוני':'רגיל', 'רגיל':'נמוך' };
  S.calls.unshift({
    id: uid(), customer: l.site || l.name || 'לקוח',
    desc: (l.topic ? l.topic + ' — ' : '') + (l.desc || 'קריאת שירות'),
    phone: l.phone || '', technician: '', urgency: mapU[l.urgency] || 'רגיל',
    status: 'חדשה', notes: 'התקבל מטופס לקוח' + (l.name ? ' · איש קשר: ' + l.name : ''),
    created: today(), createdBy: 'טופס לקוח'
  });
  pushLog('קלט קריאת לקוח: ' + (l.site || l.name || ''));
  await persist();
  try { await db.collection('leads').doc(fid).delete(); } catch(e){}
  render(); toastMsg('הקריאה נקלטה ✓');
}

/* ---------- photos in Firestore ---------- */
async function loadMediaDoc(id){
  if (photoCache[id]) return photoCache[id];
  try {
    const snap = await PHOTOS.doc(id).get();
    if (!snap.exists) return null;
    const d = snap.data();
    if (d.data) { photoCache[id] = d.data; return d.data; }
    if (d.chunks) {
      let full = '';
      for (let i = 0; i < d.chunks; i++){
        const c = await PHOTOS.doc(id + '_c' + i).get();
        if (!c.exists) return null;
        full += c.data().data;
      }
      photoCache[id] = full;
      return full;
    }
  } catch(e){ console.error(e); }
  return null;
}
function loadPhotoDoc(id){ return loadMediaDoc(id); }
function hydratePhotos(){
  document.querySelectorAll('img[data-photoid]').forEach(async img => {
    const data = await loadPhotoDoc(img.dataset.photoid);
    if (data) img.src = data;
  });
}
const CHUNK_SIZE = 900000;
async function saveMediaDoc(id, data){
  if (data.length <= CHUNK_SIZE) {
    await PHOTOS.doc(id).set({ data });
  } else {
    const n = Math.ceil(data.length / CHUNK_SIZE);
    for (let i = 0; i < n; i++) await PHOTOS.doc(id + '_c' + i).set({ data: data.slice(i*CHUNK_SIZE, (i+1)*CHUNK_SIZE) });
    await PHOTOS.doc(id).set({ chunks: n });
  }
  photoCache[id] = data;
}
async function deleteMediaDocs(ids){
  for (const id of (ids||[])) {
    try {
      const snap = await PHOTOS.doc(id).get();
      if (snap.exists && snap.data().chunks) {
        for (let i = 0; i < snap.data().chunks; i++){ try { await PHOTOS.doc(id + '_c' + i).delete(); } catch(e){} }
      }
      await PHOTOS.doc(id).delete();
    } catch(e){}
    delete photoCache[id];
  }
}
function savePhotoDoc(id, data){ return saveMediaDoc(id, data); }
function deletePhotoDocs(ids){ return deleteMediaDocs(ids); }

function compressImage(file, maxDim=900, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        if (width>maxDim || height>maxDim){
          const s = maxDim/Math.max(width,height);
          width=Math.round(width*s); height=Math.round(height*s);
        }
        const c = document.createElement('canvas');
        c.width=width; c.height=height;
        c.getContext('2d').drawImage(img,0,0,width,height);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function filteredTasks(){

function cycleTaskStatus(id){
  if (!guardEdit()) return;
  const t = S.tasks.find(x=>x.id===id); if(!t) return;
  const nextT = STATUSES[(STATUSES.indexOf(t.status)+1)%STATUSES.length];
  if (nextT === 'בוצע'){ openReportModal('task', id, nextT); return; }
  t.status = nextT;
  t.updatedBy = USER; t.updatedAt = today();
  if (t.status === 'אושר'){ t.closedBy = USER; t.closedAt = today(); }
  else { t.closedBy = ''; t.closedAt = ''; }
  pushLog('עדכן סטטוס "' + t.title + '" ל-' + t.status);
  persist(); render(); toastMsg('סטטוס עודכן: '+t.status);
}

async function saveTask(id){
  const title = document.getElementById('tf_title').value.trim();
  if (!title){ toastMsg('חסר תיאור למשימה'); return; }
  const t = id ? S.tasks.find(x=>x.id===id) : { id: uid(), created: today() };
  const oldIds = id ? taskMedia(t).map(m=>m.id) : [];

  t.projectId = document.getElementById('tf_proj').value;
  t.title = title;
  t.location = document.getElementById('tf_loc').value.trim();
  t.discipline = document.getElementById('tf_disc').value;
  t.assignee = document.getElementById('tf_assignee').value;
  t.urgency = document.getElementById('tf_urg').value;
  t.status = document.getElementById('tf_status').value;
  t.due = document.getElementById('tf_due').value;
  t.notes = document.getElementById('tf_notes').value.trim();
  const prevUpsT = t.upsell || '';
  t.upsell = (document.getElementById('tf_upsell')||{value:''}).value.trim();
  t.upsellType = (document.getElementById('tf_upstype')||{value:''}).value;
  t.report = (document.getElementById('tf_report')||{value:''}).value.trim();
  t.qty = (document.getElementById('tf_qty')||{value:''}).value.trim();
  const prevDoneT = t.doneDesc || '';
  t.doneDesc = (document.getElementById('tf_done')||{value:''}).value.trim();
  t.doneQty = (document.getElementById('tf_doneqty')||{value:''}).value.trim();
  if (t.doneDesc && t.doneDesc !== prevDoneT){ t.doneBy = USER; t.doneAt = today(); pushLog('דיווח ביצוע במשימה: ' + t.title); }
  if (t.upsell && t.upsell !== prevUpsT) pushLog('💰 מכירה נוספת: ' + t.upsell);
  t.updatedBy = USER; t.updatedAt = today();
  if (!id) t.createdBy = USER;
  if (t.status === 'אושר'){ if (!t.closedBy){ t.closedBy = USER; t.closedAt = today(); } }
  else { t.closedBy = ''; t.closedAt = ''; }
  pushLog((id?'עדכן':'פתח') + ' משימה: ' + t.title);

  toastMsg('שומר…');
  const media = [];
  for (const p of pendingPhotos){
    if (p.id) media.push({ id: p.id, kind: p.kind || 'image' });
    else { const pid = 'ph_' + uid(); await saveMediaDoc(pid, p.data); media.push({ id: pid, kind: p.kind || 'image' }); }
  }
  t.media = media;
  delete t.photoIds;
  const newIds = media.map(m=>m.id);
  const removed = oldIds.filter(x=>!newIds.includes(x));
  if (removed.length) deleteMediaDocs(removed);

  if (!id) S.tasks.unshift(t);
  await persist();
  closeModal(); render(); toastMsg('המשימה נשמרה ✓');
}
async function deleteTask(id){
  if (!isAdmin()) { toastMsg('מחיקה למנהלים בלבד'); return; }
  if (!confirm('למחוק את המשימה?')) return;
  const _t = S.tasks.find(x=>x.id===id); pushLog('מחק משימה: ' + (_t?_t.title:''));
  const t = S.tasks.find(x=>x.id===id);
  if (t) deleteMediaDocs(taskMedia(t).map(m=>m.id));
  S.tasks = S.tasks.filter(x=>x.id!==id);
  await persist();
  closeModal(); render(); toastMsg('המשימה נמחקה');
}

async function saveCall(id){
  let customer = document.getElementById('cf_site').value;
  if (customer === '__other') customer = document.getElementById('cf_customer_other').value.trim();
  const desc = document.getElementById('cf_desc').value.trim();
  if (!customer || !desc){ toastMsg('חסרים לקוח או תיאור'); return; }
  const c = id ? S.calls.find(x=>x.id===id) : { id: uid(), created: today() };
  const oldIds = id ? (c.media||[]).map(m=>m.id) : [];
  c.customer = customer; c.desc = desc;
  c.phone = document.getElementById('cf_phone').value.trim();
  c.technician = document.getElementById('cf_tech').value;
  c.urgency = document.getElementById('cf_urg').value;
  c.status = document.getElementById('cf_status').value;
  c.notes = document.getElementById('cf_notes').value.trim();
  const prevUpsC = c.upsell || '';
  c.upsell = (document.getElementById('tf_upsell')||{value:''}).value.trim();
  c.upsellType = (document.getElementById('tf_upstype')||{value:''}).value;
  c.report = (document.getElementById('tf_report')||{value:''}).value.trim();
  c.qty = (document.getElementById('tf_qty')||{value:''}).value.trim();
  const prevDoneC = c.doneDesc || '';
  c.doneDesc = (document.getElementById('tf_done')||{value:''}).value.trim();
  c.doneQty = (document.getElementById('tf_doneqty')||{value:''}).value.trim();
  if (c.doneDesc && c.doneDesc !== prevDoneC){ c.doneBy = USER; c.doneAt = today(); pushLog('דיווח ביצוע בקריאה: ' + c.customer); }
  if (c.upsell && c.upsell !== prevUpsC) pushLog('💰 מכירה נוספת: ' + c.upsell);
  c.updatedBy = USER; c.updatedAt = today();
  if (!id) c.createdBy = USER;
  pushLog((id?'עדכן':'פתח') + ' קריאה: ' + c.customer);
  if (c.status === 'נסגרה'){ if (!c.closedBy){ c.closedBy = USER; c.closedAt = today(); } }
  else { c.closedBy = ''; c.closedAt = ''; }
  toastMsg('שומר…');
  const cMedia = [];
  for (const p of pendingPhotos){
    if (p.id) cMedia.push({ id: p.id, kind: p.kind || 'image' });
    else { const pid = 'ph_' + uid(); await saveMediaDoc(pid, p.data); cMedia.push({ id: pid, kind: p.kind || 'image' }); }
  }
  c.media = cMedia;
  const cRemoved = oldIds.filter(x=>!cMedia.map(m=>m.id).includes(x));
  if (cRemoved.length) deleteMediaDocs(cRemoved);
  if (!id) S.calls.unshift(c);
  await persist();
  closeModal(); render(); toastMsg('הקריאה נשמרה ✓');
}
async function deleteCall(id){
  if (!isAdmin()) { toastMsg('מחיקה למנהלים בלבד'); return; }
  if (!confirm('למחוק את הקריאה?')) return;
  const _c = S.calls.find(x=>x.id===id); pushLog('מחק קריאה: ' + (_c?_c.customer:''));
  if (_c && _c.media) deleteMediaDocs(_c.media.map(m=>m.id));
  S.calls = S.calls.filter(x=>x.id!==id);
  await persist();
  closeModal(); render(); toastMsg('הקריאה נמחקה');
}

/* ---------- Reports ---------- */
function buildProjReport(projId){
  const p = S.projects.find(x=>x.id===projId);
  const items = S.tasks.filter(t=>t.projectId===projId && t.status!=='אושר');
  let msg = `*דוח מצב — ${p?p.name:''}*\n📅 ${fmtDate(today())}\n`;
  if (items.length===0) msg += '\n✅ אין משימות פתוחות';
  else {
    const byLoc = {};
    items.forEach(t=>{ const k=t.location||'כללי'; (byLoc[k]=byLoc[k]||[]).push(t); });
    Object.entries(byLoc).forEach(([loc,arr])=>{
      msg += `\n📍 *${loc}*\n`;
      arr.forEach(t=>{
        const flag = t.urgency==='דחוף'?'🔴':t.urgency==='גבוה'?'🟠':'🔹';
        msg += `${flag} ${t.title} — ${t.status}${t.assignee?` (${t.assignee})`:''}${t.doneQty?` | בוצע: ${t.doneQty}`:''}\n`;
      });
    });
    msg += `\nסה"כ: ${items.length} משימות פתוחות`;
  }
  msg += '\n\n_VAS Security — ש.ו טכנולוגיות ביטחון_';
  return msg;
}
function buildPersonReport(person){
  const items = S.tasks.filter(t=>t.assignee===person && (t.status==='פתוח'||t.status==='בטיפול'));
  const callItems = S.calls.filter(c=>c.technician===person && c.status!=='נסגרה');
  let msg = `*תוכנית עבודה — ${person}*\n📅 ${fmtDate(today())}\n`;
  if (items.length===0 && callItems.length===0) msg += '\nאין משימות פתוחות ✅';
  items.forEach(t=>{
    const flag = t.urgency==='דחוף'?'🔴':t.urgency==='גבוה'?'🟠':'🔹';
    msg += `\n${flag} *${projName(t.projectId)}* — ${t.title}`;
    if (t.location) msg += ` (${t.location})`;
    if (t.due) msg += ` · יעד ${fmtDate(t.due)}`;
  });
  callItems.forEach(c=>{ msg += `\n🛠️ קריאת שירות: ${c.customer} — ${c.desc}`; });
  msg += '\n\nבהצלחה! 💪';
  return msg;
}
function buildDailyReport(d){
  const dispD = fmtDate(d);
  const doneT = S.tasks.filter(t => (t.closedAt === d) || (t.updatedAt === d && (t.status === 'בוצע' || t.status === 'אושר')));
  const doneC = S.calls.filter(c => (c.closedAt === d) || (c.updatedAt === d && c.status === 'נסגרה'));
  const openT = S.tasks.filter(t => t.status === 'פתוח' || t.status === 'בטיפול');
  const openC = S.calls.filter(c => c.status !== 'נסגרה');
  const newT = S.tasks.filter(t => t.created === d).length;
  const newC = S.calls.filter(c => c.created === d).length;
  const ups = [...S.tasks, ...S.calls].filter(x => x.upsell && x.updatedAt === d);

  let msg = `*דוח יומי — ${dispD}*\n`;
  if (newT || newC) msg += `נפתחו היום: ${newT} משימות, ${newC} קריאות\n`;

  msg += `\n✅ *בוצע היום (${doneT.length + doneC.length}):*\n`;
  if (!doneT.length && !doneC.length) msg += `— אין סגירות היום\n`;
  doneT.forEach(t => {
    msg += `🔹 ${projName(t.projectId)} — ${t.title}`;
    if (t.report) msg += ` | ${t.report}`;
    if (t.qty) msg += ` (${t.qty})`;
    if (t.updatedBy) msg += ` — ${t.updatedBy}`;
    msg += `\n`;
  });
  doneC.forEach(c => {
    msg += `🛠️ קריאה: ${c.customer} — ${c.desc}`;
    if (c.report) msg += ` | ${c.report}`;
    if (c.closedBy || c.updatedBy) msg += ` — ${c.closedBy || c.updatedBy}`;
    msg += `\n`;
  });

  msg += `\n⏳ *נותר לביצוע (${openT.length + openC.length}):*\n`;
  if (!openT.length && !openC.length) msg += `— הכל סגור! 🎉\n`;
  const byProj = {};
  openT.forEach(t => { const k = projName(t.projectId); (byProj[k] = byProj[k] || []).push(t); });
  Object.entries(byProj).forEach(([proj, arr]) => {
    msg += `📁 *${proj}:*\n`;
    arr.forEach(t => {
      const flag = t.urgency === 'דחוף' ? '🔴' : t.urgency === 'גבוה' ? '🟠' : '▫️';
      msg += `${flag} ${t.title}${t.location ? ' (' + t.location + ')' : ''} — ${t.status}${t.assignee ? ' · ' + t.assignee : ''}${isOverdue(t) ? ' ⚠️ באיחור' : ''}\n`;
    });
  });
  if (openC.length) {
    msg += `🛠️ *קריאות פתוחות:*\n`;
    openC.forEach(c => { msg += `▫️ ${c.customer} — ${c.desc} (${c.status})${c.technician ? ' · ' + c.technician : ''}\n`; });
  }

  const att = (S.checkins||[]).filter(c=>c.d===d);
  if (att.length){
    msg += `\n🕒 *נוכחות:*\n`;
    att.forEach(c => {
      msg += `${c.type==='in'?'📍':'🏁'} ${c.by} — ${c.type==='in'?'הגעה':'עזיבה'} ${c.t}${c.site?' · '+c.site:''}`;
      if (c.lat) msg += `\nמפה: https://maps.google.com/?q=${c.lat},${c.lng}`;
      if (c.noGps) msg += ' ⚠️ ללא GPS';
      msg += `\n`;
    });
  }
  const pres = [];
  S.tasks.forEach(t => (t.presence||[]).forEach(p => { if (p.d === d) pres.push({ by:p.by, type:p.type, t:p.t, where: projName(t.projectId) + (t.location ? ' · ' + t.location : '') }); }));
  S.calls.forEach(c => (c.presence||[]).forEach(p => { if (p.d === d) pres.push({ by:p.by, type:p.type, t:p.t, where: c.customer }); }));
  if (pres.length && isHoursAdmin()){
    msg += `\n📍 *נוכחות באתרים:*\n`;
    pres.sort((a,b)=>a.t.localeCompare(b.t)).forEach(p => { msg += `▫️ ${p.by} — ${p.type==='in'?'הגעה':'סיום'} ${p.t} · ${p.where}\n`; });
  }

  if (ups.length) {
    msg += `\n💰 *מכירות/לידים שנרשמו היום:*\n`;
    ups.forEach(u => { msg += `▫️ ${u.upsellType ? '[' + u.upsellType + '] ' : ''}${u.upsell}${u.upsellAmt ? ' — ' + u.upsellAmt + ' ₪' : ''} (${u.updatedBy || u.createdBy || ''})\n`; });
  }

  msg += `\n_VAS Security — ש.ו טכנולוגיות ביטחון_`;
  return msg;
}

function exportBackup(){
  const data = { projects:S.projects, team:S.team, tasks:S.tasks.map(t=>({...t})), calls:S.calls, exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vas-punch-backup-' + today() + '.json';
  a.click();

}
function importBackup(e){
  if (!isAdmin()) { toastMsg('שחזור למנהלים בלבד'); return; }
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.projects || !data.team) throw new Error('bad file');
      if (!confirm('השחזור ידרוס את הנתונים הנוכחיים. להמשיך?')) return;
      S.projects = data.projects; S.team = data.team;
      S.tasks = data.tasks || []; S.calls = data.calls || [];
      await persist(); render(); toastMsg('הגיבוי שוחזר ✓');
    } catch(err){ toastMsg('קובץ גיבוי לא תקין'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function fmtDur(mins){
  if (mins == null || mins < 0) return '';
  return Math.floor(mins/60) + ':' + String(mins%60).padStart(2,'0');
}
function toMins(t){ const [h,m] = (t||'0:0').split(':').map(Number); return h*60+m; }
function buildPresenceReport(from, to, person){
  if (!isHoursAdmin()) return 'דוח נוכחות זמין לאבישי והילה בלבד';
  const ev = [];
  const add = (p, where) => { if (p.d >= from && p.d <= to && (!person || p.by === person)) ev.push({ by:p.by, type:p.type, d:p.d, t:p.t, where }); };
  S.tasks.forEach(t => (t.presence||[]).forEach(p => add(p, projName(t.projectId) + (t.location ? ' · ' + t.location : ''))));
  S.calls.forEach(c => (c.presence||[]).forEach(p => add(p, c.customer)));
  let msg = `*דוח נוכחות ושעות*\n📅 ${fmtDate(from)} — ${fmtDate(to)}${person ? '\n👷 ' + person : ''}\n`;
  if (!ev.length) return msg + '\nאין רישומי נוכחות בתקופה זו';
  const byPerson = {};
  ev.forEach(e => { (byPerson[e.by] = byPerson[e.by] || []).push(e); });
  Object.entries(byPerson).forEach(([who, list]) => {
    list.sort((a,b) => (a.d + a.t).localeCompare(b.d + b.t));
    msg += `\n👷 *${who}*\n`;
    const dayTotals = {};
    let openIn = null;
    list.forEach(e => {
      if (e.type === 'in'){
        if (openIn) msg += `▫️ ${fmtDate(openIn.d)} · ${openIn.where}: הגעה ${openIn.t} — ללא סימון סיום ⚠️\n`;
        openIn = e;
      } else {
        if (openIn && openIn.d === e.d){
          const dur = toMins(e.t) - toMins(openIn.t);
          msg += `▫️ ${fmtDate(e.d)} · ${openIn.where}: ${openIn.t}–${e.t} (${fmtDur(dur)})\n`;
          dayTotals[e.d] = (dayTotals[e.d] || 0) + Math.max(0, dur);
          openIn = null;
        } else {
          msg += `▫️ ${fmtDate(e.d)} · ${e.where}: סיום ${e.t} (ללא סימון הגעה)\n`;
        }
      }
    });
    if (openIn) msg += `▫️ ${fmtDate(openIn.d)} · ${openIn.where}: הגעה ${openIn.t} — ללא סימון סיום ⚠️\n`;
    const days = Object.keys(dayTotals);
    if (days.length){
      days.sort().forEach(dd => { msg += `   סה"כ ${fmtDate(dd)}: ${fmtDur(dayTotals[dd])} שעות\n`; });
      const grand = days.reduce((s,dd)=>s+dayTotals[dd],0);
      if (days.length > 1) msg += `   *סה"כ לתקופה: ${fmtDur(grand)} שעות*\n`;
    }
  });
  msg += '\n📍 נקודות ה-GPS המדויקות זמינות על כרטיסי המשימות (כפתור "מפה")';
  msg += '\n\n_VAS Security — ש.ו טכנולוגיות ביטחון_';
  return msg;
}
function buildBillingReport(from, to){
  const inRange = d => d && d >= from && d <= to;
  const items = [];
  S.tasks.forEach(t => {
    if ((t.status === 'בוצע' || t.status === 'אושר') && inRange(t.closedAt || t.updatedAt))
      items.push({ cust: projName(t.projectId), d: t.closedAt || t.updatedAt, what: t.title + (t.location ? ' (' + t.location + ')' : ''), rep: t.report || '', qty: t.qty || '', by: t.closedBy || t.updatedBy || '', bill: t.billing });
  });
  S.calls.forEach(c => {
    if (c.status === 'נסגרה' && inRange(c.closedAt || c.updatedAt))
      items.push({ cust: c.customer, d: c.closedAt || c.updatedAt, what: c.desc, rep: c.report || '', qty: c.qty || '', by: c.closedBy || c.updatedBy || '', bill: c.billing });
  });
  let msg = `*דוח עבודות לחיוב*\n📅 ${fmtDate(from)} — ${fmtDate(to)}\n`;
  if (!items.length) return msg + '\nאין עבודות שהושלמו בתקופה זו';
  const byCust = {};
  items.forEach(i => (byCust[i.cust] = byCust[i.cust] || []).push(i));
  let pending = 0, billed = 0;
  Object.entries(byCust).forEach(([cust, arr]) => {
    msg += `\n🏢 *${cust}* (${arr.length}):\n`;
    arr.sort((a,b)=>(a.d||'').localeCompare(b.d||'')).forEach(i => {
      const st = i.bill ? (i.bill.state === 'billed' ? '✅ חויב' + (i.bill.inv ? " חש' " + i.bill.inv : '') : '➖ ללא חיוב') : '💳 ממתין לחיוב';
      if (!i.bill) pending++; else if (i.bill.state === 'billed') billed++;
      msg += `▫️ ${fmtDate(i.d)} — ${i.what}`;
      if (i.rep) msg += ` | ${i.rep}`;
      if (i.qty) msg += ` (${i.qty})`;
      msg += ` — ${i.by} · ${st}\n`;
    });
  });
  msg += `\nסה"כ: ${items.length} עבודות · ${billed} חויבו · ${pending} ממתינות לחיוב`;
  msg += '\n\n_VAS Security — ש.ו טכנולוגיות ביטחון_';
  return msg;
}
function toggleUpsellPaid(kind, id){
  if (!isAdmin()){ toastMsg('סימון תגמול למנהלים בלבד'); return; }
  const arr = kind==='task' ? S.tasks : S.calls;
  const x = arr.find(i=>i.id===id); if(!x) return;
  x.upsellPaid = !x.upsellPaid;
  pushLog((x.upsellPaid?'סימן כתוגמל':'ביטל סימון תגמול') + ': ' + (x.upsell||''));
  persist(); render(); toastMsg(x.upsellPaid?'סומן כתוגמל ✓':'הסימון בוטל');
}
function tfRenderLoc(keepVal){
  const wrap = document.getElementById('tf_locwrap'); if (!wrap) return;
  const cur = document.getElementById('tf_loc');
  const keep = (typeof keepVal === 'string') ? keepVal : (cur ? cur.value : '');
  const projSel = document.getElementById('tf_proj');
  const p = S.projects.find(x=>x.id===(projSel?projSel.value:''));
  const isMax = p && p.name.indexOf('מקס') !== -1;
  if (isMax) {
    const opts = MAXSTOCK_BRANCHES.map(b=>b.n);
    const extra = (keep && opts.indexOf(keep) === -1) ? `<option selected>${esc(keep)}</option>` : '';
    wrap.innerHTML = `<select id="tf_loc"><option value="">— בחרו סניף —</option>${extra}${opts.map(o=>`<option${keep===o?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  } else {
    wrap.innerHTML = `<input id="tf_loc" value="${esc(keep)}" placeholder="קומה 12 · גרעין ב׳">`;
  }
}
function siteList(){ return [...S.projects.filter(p=>p.active).map(p=>p.name), ...MAXSTOCK_BRANCHES.map(b=>b.n)]; }
function siteOptions(cur){
  const projs = S.projects.filter(p=>p.active).map(p=>p.name);
  const branches = MAXSTOCK_BRANCHES.map(b=>b.n);
  const all = [...projs, ...branches];
  return `<optgroup label="פרויקטים">` +
    projs.map(s=>`<option value="${esc(s)}"${cur===s?' selected':''}>${esc(s)}</option>`).join('') +
    `</optgroup><optgroup label="סניפי מקס סטוק">` +
    branches.map(s=>`<option value="${esc(s)}"${cur===s?' selected':''}>${esc(s)}</option>`).join('') +
    `</optgroup><option value="__other"${(cur && !all.includes(cur))?' selected':''}>אחר…</option>`;
}
const taskMedia = t => t.media || (t.photoIds||[]).map(id=>({ id, kind:'image' }));
function mediaStrip(list){
  if (!list || !list.length) return '';
  return `<div class="task-photos">${list.map(m => m.kind==='video'
    ? `<div class="vid-thumb" onclick="openMedia('${m.id}','video')">▶</div>`
    : `<img data-photoid="${m.id}" onclick="openMedia('${m.id}','image')" alt="">`).join('')}</div>`;
}
async function openMedia(id, kind){
  const ov = document.getElementById('photoOverlay');
  const img = document.getElementById('photoOverlayImg');
  const vid = document.getElementById('photoOverlayVid');
  img.style.display = kind==='video' ? 'none' : '';
  vid.style.display = kind==='video' ? '' : 'none';
  img.removeAttribute('src'); vid.removeAttribute('src');
  ov.style.display = 'flex';
  const data = await loadMediaDoc(id);
  if (!data){ toastMsg('לא ניתן לטעון את הקובץ'); return; }
  if (kind==='video') vid.src = data; else img.src = data;
}
function closeMedia(){
  const vid = document.getElementById('photoOverlayVid');
  try { vid.pause(); } catch(e){}
  vid.removeAttribute('src');
  document.getElementById('photoOverlay').style.display = 'none';
}
function attachMediaInput(){
  const el = document.getElementById('tf_file'); if (!el) return;
  el.onchange = async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (pendingPhotos.length >= 4){ toastMsg('עד 4 קבצים לפריט'); e.target.value=''; return; }
    try {
      if (file.type.startsWith('video')){
        if (file.size > 8*1024*1024){ toastMsg('סרטון עד 8MB — צלמו סרטון קצר יותר'); e.target.value=''; return; }
        const data = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
        pendingPhotos.push({ data, kind:'video' });
      } else {
        const data = await compressImage(file);
        pendingPhotos.push({ data, kind:'image' });
      }
      renderFormPhotos();
    } catch(err){ toastMsg('שגיאה בטעינת הקובץ'); }
    e.target.value = '';
  };
}
function _find(kind, id){ return kind==='task' ? S.tasks.find(x=>x.id===id) : S.calls.find(x=>x.id===id); }
function claimBlock(kind, x){
  if (READONLY || !USER) return '';
  const req = x.claimReq;
  if (req){
    if (isAdmin()) return `<div class="claim-row">🙋 <b>${esc(req.by)}</b> מבקש לקחת
      <button class="btn-mini" onclick="approveClaim('${kind}','${x.id}')">אישור</button>
      <button class="btn-mini" style="background:#D64545" onclick="denyClaim('${kind}','${x.id}')">דחייה</button></div>`;
    if (req.by === USER) return `<div class="claim-row">⏳ הבקשה שלך ממתינה לאישור מנהל</div>`;
    return `<div class="claim-row">🙋 ${esc(req.by)} ביקש לקחת את הפריט</div>`;
  }
  const assignee = kind==='task' ? x.assignee : x.technician;
  const closed = kind==='task' ? x.status==='אושר' : x.status==='נסגרה';
  if (!isAdmin() && !closed && assignee !== USER)
    return `<div class="claim-row"><button class="btn-mini" style="background:#3B6EA5" onclick="requestClaim('${kind}','${x.id}')">🙋 בקש לקחת אליי</button></div>`;
  return '';
}
function requestClaim(kind, id){
  if (!guardEdit()) return;
  const x = _find(kind, id); if (!x) return;
  x.claimReq = { by: USER, d: fmtDate(today()) };
  pushLog('ביקש לקחת ' + (kind==='task' ? 'משימה: ' + x.title : 'קריאה: ' + x.customer));
  persist(); render(); toastMsg('הבקשה נשלחה למנהל 🙋');
}
function approveClaim(kind, id){
  if (!isAdmin()){ toastMsg('אישור בקשות למנהלים בלבד'); return; }
  const x = _find(kind, id); if (!x || !x.claimReq) return;
  const who = x.claimReq.by;
  if (kind==='task') x.assignee = who; else x.technician = who;
  x.claimReq = null;
  pushLog('אישר העברת ' + (kind==='task'?'משימה':'קריאה') + ' ל-' + who);
  persist(); render(); toastMsg('אושר — הועבר ל' + who + ' ✓');
}
function denyClaim(kind, id){
  if (!isAdmin()){ toastMsg('אישור בקשות למנהלים בלבד'); return; }
  const x = _find(kind, id); if (!x) return;
  pushLog('דחה בקשה של ' + (x.claimReq ? x.claimReq.by : ''));
  x.claimReq = null;
  persist(); render(); toastMsg('הבקשה נדחתה');
}
function pendingCard(){
  const reqs = [
    ...S.tasks.filter(t=>t.claimReq).map(t=>({ kind:'task', x:t, label:t.title })),
    ...S.calls.filter(c=>c.claimReq).map(c=>({ kind:'call', x:c, label:c.customer + ' — ' + c.desc }))
  ];
  if (!reqs.length) return '';
  return `<div class="card"><div class="card-title urgent-title">🙋 בקשות ממתינות לאישור (${reqs.length})</div>
    ${reqs.map(r=>`<div class="claim-row"><b>${esc(r.x.claimReq.by)}</b> ← ${esc(r.label)}
      <button class="btn-mini" onclick="approveClaim('${r.kind}','${r.x.id}')">אישור</button>
      <button class="btn-mini" style="background:#D64545" onclick="denyClaim('${r.kind}','${r.x.id}')">דחייה</button></div>`).join('')}
  </div>`;
}
function showUserModal(){
  const team = (S && S.team && S.team.length) ? S.team : [];
  modalShell('מי אתה?', `
    <div class="settings-sub" style="margin-bottom:10px">בחרו את השם שלכם — כל פעולה במערכת תתועד על שמכם</div>
    ${team.map(m=>`<button class="btn-secondary" style="width:100%;margin-bottom:8px;text-align:right" onclick="setUser('${esc(m.name)}')">${esc(m.name)} · ${esc(m.role)}</button>`).join('') || '<div class="empty">טוען רשימת צוות…</div>'}`);
}
function setUser(n){
  USER = n; localStorage.setItem('vas:user', n);
  closeModal(); render(); toastMsg('ברוך הבא, ' + n + ' 👋');
}
function switchUser(){
  localStorage.removeItem('vas:user'); USER = '';
  render(); showUserModal();
}
function pushLog(a){
  if (!S) return;
  S.log = S.log || [];
  const d = new Date();
  const stamp = fmtDate(today()) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  S.log.unshift({ d: stamp, u: USER || '?', a });
  if (S.log.length > 150) S.log.length = 150;
}
async function restoreBackup(){
  if (!isAdmin()) { toastMsg('שחזור למנהלים בלבד'); return; }
  try {
    const snap = await PHOTOS.doc('punch_backup').get();
    if (!snap.exists) { toastMsg('אין גיבוי אוטומטי עדיין'); return; }
    const b = snap.data();
    if (!confirm('לשחזר את המצב שלפני השינוי האחרון (' + (b.at||'').slice(0,16).replace('T',' ') + ' / ' + (b.by||'') + ')?')) return;
    S = JSON.parse(b.data);
    pushLog('שחזר גיבוי אוטומטי');
    await persist(); render(); toastMsg('הגיבוי שוחזר ✓');
  } catch(e) { console.error(e); toastMsg('שגיאה בשחזור'); }
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
function copyViewLink(){
  const url = location.origin + location.pathname + '?view=1';
  copyText(url); toastMsg('קישור הצפייה הועתק');
}
